            padding: 0;
            box-sizing: border-box;

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-bottom: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .social-btn:active {
            transform: translateY(0);
        }

        .btn-github {
            background: #24292e;
        }
        .btn-github:hover {
            background: #2c3238;
            box-shadow: 0 8px 25px rgba(36, 41, 46, 0.5);
        }

        .btn-tiktok {
            background: #010101;
        }
        .btn-tiktok:hover {
            background: #1a1a1a;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        .btn-youtube {
            background: #c4302b;
        }
        .btn-youtube:hover {
            background: #d93a35;
            box-shadow: 0 8px 25px rgba(196, 48, 43, 0.5);
        }

        .btn-instagram {
            background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af, #515bd4);
        }
        .btn-instagram:hover {
            box-shadow: 0 8px 25px rgba(221, 42, 123, 0.5);

        .footer {

            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
